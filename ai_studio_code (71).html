<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bombards | ETRN Hub</title>
    <style>
        :root { --cyan: #00f2ff; --purple: #bc13fe; --orange: #ffa500; --day5-blue: #0066ff; --bow-red: #ff0033; --gold: #ffcc00; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        body { background: #000; color: white; overflow-x: hidden; min-height: 200vh; }
        #bg-video { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: -10; filter: brightness(0.25); }
        #star-canvas { position: fixed; inset: 0; width: 100%; height: 100%; z-index: -9; pointer-events: none; }
        .theme-aura { position: fixed; inset: 0; z-index: -8; opacity: 0; transition: 0.8s; pointer-events: none; }
        .p-aura { background: radial-gradient(circle, rgba(26, 0, 51, 0.7) 0%, #000 100%); }
        .b-aura { background: radial-gradient(circle, rgba(0, 20, 51, 0.8) 0%, #000 100%); }
        .r-aura { background: radial-gradient(circle, rgba(51, 0, 0, 0.8) 0%, #000 100%); }
        .h-aura { background: radial-gradient(circle, rgba(0, 242, 255, 0.2) 0%, #000 100%); }
        .hero-aura { background: radial-gradient(circle, rgba(255, 204, 0, 0.25) 0%, #000 100%); }
        .corner-btn { position: fixed; top: 25px; z-index: 500; padding: 12px 25px; background: rgba(0,0,0,0.6); font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .heal-pos { left: 25px; border: 2px solid var(--cyan); color: var(--cyan); clip-path: polygon(0 0, 100% 0, 85% 100%, 0 100%); }
        .hero-pos { right: 25px; border: 2px solid var(--gold); color: var(--gold); clip-path: polygon(15% 0, 100% 0, 100% 100%, 0 100%); }
        .corner-btn:hover { background: white; color: #000; box-shadow: 0 0 30px white; }
        section { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px; position: relative; }
        h1 { font-size: clamp(3.5rem, 15vw, 8.5rem); letter-spacing: 20px; text-transform: uppercase; text-shadow: 0 0 20px var(--cyan); animation: breathe 4s infinite ease-in-out; }
        .etrn { color: var(--cyan); font-size: 1.8rem; letter-spacing: 15px; margin-bottom: 40px; font-weight: 800; }
        .btn-stack { display: flex; flex-direction: column; gap: 15px; }
        .btn { padding: 18px 60px; font-weight: bold; letter-spacing: 4px; cursor: pointer; transition: 0.4s; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%); text-transform: uppercase; background: rgba(0,0,0,0.6); }
        .btn-std { border: 2px solid var(--purple); color: var(--purple); }
        .btn-d5 { border: 2px solid var(--day5-blue); color: var(--day5-blue); }
        .btn-bow { border: 2px solid var(--bow-red); color: var(--bow-red); }
        .btn:hover { background: white; color: black; transform: scale(1.05); }
        .legend-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 30px; width: 100%; max-width: 1200px; margin-top: 50px;}
        .name-box { padding: 25px; background: rgba(0,0,0,0.85); text-align: center; font-weight: 900; font-size: 1.3rem; border: 3px solid; animation: neonRainbow 5s linear infinite; }
        @keyframes neonRainbow { 0%, 100% { border-color: #f00; color: #f00; } 50% { border-color: #0ff; color: #0ff; } }
        .overlay { position: fixed; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(50px); opacity: 0; transition: 0.5s; }
        .overlay.active { display: flex; opacity: 1; }
        .panel { width: 95%; max-width: 850px; padding: 40px; background: rgba(0,0,0,0.96); }
        .ui-p { border: 2px solid var(--purple); } .ui-b { border: 2px solid var(--day5-blue); } .ui-r { border: 2px solid var(--bow-red); } .ui-h { border: 2px solid var(--cyan); } .ui-hero { border: 2px solid var(--gold); }
        .in-row { display: flex; align-items: center; background: rgba(255,255,255,0.03); margin-bottom: 12px; }
        .in-lbl { width: 130px; padding: 15px; font-size: 0.75rem; color: #888; }
        input { flex: 1; background: transparent; border: none; color: white; padding: 15px; text-align: center; font-size: 1.4rem; outline: none; }
        .res-line { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 1.3rem; }
        .exit { margin-top: 30px; cursor: pointer; text-align: center; color: #555; }
        @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    </style>
</head>
<body>
    <video autoplay muted loop playsinline id="bg-video"><source src="gojo.mp4" type="video/mp4"></video>
    <canvas id="star-canvas"></canvas>
    <div id="aura-p" class="theme-aura p-aura"></div><div id="aura-b" class="theme-aura b-aura"></div><div id="aura-r" class="theme-aura r-aura"></div><div id="aura-h" class="theme-aura h-aura"></div><div id="aura-hero" class="theme-aura hero-aura"></div>
    <button class="corner-btn heal-pos" onclick="openUI('healing')">Healing</button>
    <button class="corner-btn hero-pos" onclick="openUI('hero')">Hero Calc</button>
    <section>
        <h1>BOMBARDS</h1><div class="etrn">ETRN</div>
        <div class="btn-stack">
            <button class="btn btn-std" onclick="openUI('standard')">Standard SLE</button>
            <button class="btn btn-d5" onclick="openUI('day5')">SLE Day 5</button>
            <button class="btn btn-bow" onclick="openUI('bow')">Brink of War</button>
        </div>
    </section>
    <section id="legends">
        <div class="legend-grid">
            <div class="name-box">OnlyCavs</div><div class="name-box">Yamipoli</div><div class="name-box">Enmir</div><div class="name-box">Hermes</div><div class="name-box">MythiCole</div>
        </div>
    </section>
    <div id="event-overlay" class="overlay"><div id="event-panel" class="panel">
        <h2 id="event-title" style="text-align: center; margin-bottom: 30px;">CALCULATOR</h2>
        <div class="in-row"><div class="in-lbl">Days</div><input type="number" id="v_d" value="0" oninput="runMath()"></div>
        <div class="in-row"><div class="in-lbl">Hours</div><input type="number" id="v_h" value="0" oninput="runMath()"></div>
        <div class="in-row"><div class="in-lbl">Minutes</div><input type="number" id="v_m" value="0" oninput="runMath()"></div>
        <div class="in-row"><div class="in-lbl">Speedup %</div><input type="number" id="v_s" value="0" oninput="runMath()"></div>
        <div id="res-box"></div><span class="exit" onclick="closeUI()">EXIT</span>
    </div></div>
    <div id="hero-overlay" class="overlay"><div class="panel ui-hero"><h2 style="color:var(--gold); text-align:center;">HERO SKILLS</h2><div id="hero-res" style="font-size:3rem; text-align:center; color:var(--gold);">0</div><span class="exit" onclick="closeUI()">EXIT</span></div></div>
    <div id="heal-overlay" class="overlay"><div class="panel ui-h"><h2 style="color:var(--cyan); text-align:center;">HEALING</h2><div id="heal-res" style="text-align:center;">Resources: 0</div><span class="exit" onclick="closeUI()">EXIT</span></div></div>
    
    <div style="text-align: center; padding: 40px;">
        <img src="https://komarev.com/ghpvc/?username=Bombardss&repo=Bombards&color=00f2ff&style=flat-square&label=HUB+VISITORS" alt="Views">
    </div>

    <script>
        let mode = 'standard';
        const canvas = document.getElementById('star-canvas'), ctx = canvas.getContext('2d');
        let stars = [];

        function runMath() {
            const tm = (parseFloat(document.getElementById('v_d').value)||0)*1440 + (parseFloat(document.getElementById('v_h').value)||0)*60 + (parseFloat(document.getElementById('v_m').value)||0);
            const b = tm * (1 + (parseFloat(document.getElementById('v_s').value)||0)/100);
            document.getElementById('res-box').innerHTML = `<div class="res-line">Points: ${(b * 0.5).toLocaleString()}</div>`;
        }
        function openUI(m) {
            mode = m; document.querySelectorAll('.overlay').forEach(o => o.style.display = 'none');
            const target = (m==='healing') ? 'heal-overlay' : (m==='hero') ? 'hero-overlay' : 'event-overlay';
            const el = document.getElementById(target); el.style.display = 'flex'; setTimeout(()=>el.classList.add('active'),10);
        }
        function closeUI() { document.querySelectorAll('.overlay').forEach(o => { o.classList.remove('active'); setTimeout(()=>o.style.display='none',500); }); }
